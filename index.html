<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Availability</title>

<style>
/* (UNCHANGED STYLES — keeping yours exactly) */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0f0f0f;
  color: #e8e6e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.container { width: 100%; max-width: 460px; }

.header { margin-bottom: 2.5rem; }

.header h1 {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 0.5rem;
}

.header p {
  font-size: 26px;
  font-weight: 600;
}

.card, .result-card {
  background: #1a1a1a;
  border: 0.5px solid #2e2e2e;
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.result-card { display: none; }
.result-card.visible { display: block; }

.input-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.25rem;
}

.field label, .slots-label {
  font-size: 11px;
  text-transform: uppercase;
  color: #666;
}

.field input {
  width: 100%;
  background: #111;
  border: 0.5px solid #333;
  border-radius: 10px;
  padding: 0.75rem;
  font-size: 18px;
  color: #e8e6e0;
  text-align: center;
}

button {
  width: 100%;
  padding: 0.9rem;
  background: #e8e6e0;
  color: #0f0f0f;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.slots-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}

.slot-item {
  background: #111;
  border: 0.5px solid #2e2e2e;
  border-radius: 8px;
  padding: 0.5rem;
}

.dot-green { background: #4ade80; }
.dot-orange { background: #fb923c; }

.wa-btn {
  display: block;
  margin-top: 1rem;
  padding: 0.75rem;
  text-align: center;
  background: #0d2e1a;
  color: #4ade80;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <input id="myNum" placeholder="Your #" />
  <input id="oppNum" placeholder="Opponent #" />
  <input id="roundNum" placeholder="Batch" />
  <button onclick="findSlots()">Find</button>
</div>

<div class="result-card" id="resultCard">
  <div id="resultBody"></div>
</div>

</div>

<script>

const SHEET_ID = '1GlI41zACu2-1xbo6dZXFLMW6cqJrx0fEc2mywIRoeFg';
const RESPONSES_TAB = 'Form Responses';

const SLOT_COLS = [
'6pm–7pm','7pm–8pm','8pm–9pm','9pm–10pm'
];

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${tabName}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
  return json.table;
}

function parseRows(table) {
  const headers = table.cols.map(c => c.label);
  return table.rows.map(r => {
    let obj = {};
    r.c.forEach((cell,i)=> obj[headers[i]] = cell?.v || '');
    return obj;
  });
}

function getLatest(rows, p, r) {
  return rows.filter(x => x['Player Number']==p && x['Round Number']==r).pop();
}

function getSlots(row){
  let s={ 'Day 1':[], 'Day 2':[] };
  SLOT_COLS.forEach(slot=>{
    let v=row[`Availability [${slot}]`]||'';
    if(v.includes('Day 1')) s['Day 1'].push(slot);
    if(v.includes('Day 2')) s['Day 2'].push(slot);
  });
  return s;
}

function intersect(a,b){
  return {
    'Day 1': a['Day 1'].filter(x=>b['Day 1'].includes(x)),
    'Day 2': a['Day 2'].filter(x=>b['Day 2'].includes(x))
  };
}

function render(slots,color){
  let html='';
  ['Day 1','Day 2'].forEach(d=>{
    if(slots[d].length){
      html+=`<p>${d}</p>`;
      slots[d].forEach(s=>{
        html+=`<div class="slot-item"><span class="${color}"></span> ${s}</div>`;
      });
    }
  });
  return html;
}

function formatSlots(slots){
  return ['Day 1','Day 2']
    .map(d=>slots[d].length?`${d}: ${slots[d].join(', ')}`:'')
    .filter(Boolean)
    .join(' | ');
}

async function findSlots(){

  let my = myNum.value;
  let opp = oppNum.value;
  let round = roundNum.value;

  const table = await fetchSheet(RESPONSES_TAB);
  const rows = parseRows(table);

  const myRow = getLatest(rows,my,round);
  const oppRow = getLatest(rows,opp,round);

  const mySlots = getSlots(myRow);
  const oppSlots = getSlots(oppRow);
  const common = intersect(mySlots,oppSlots);

  const hasCommon = common['Day 1'].length || common['Day 2'].length;

  const body = document.getElementById('resultBody');

  if(hasCommon){
    body.innerHTML = `<h3>Common Slots</h3>` + render(common,'dot-green');
  }

  else{

    const allOpp = [
      ...oppSlots['Day 1'].map(s=>({day:'Day 1',slot:s})),
      ...oppSlots['Day 2'].map(s=>({day:'Day 2',slot:s}))
    ];

    body.innerHTML = `
      <h3>No overlap</h3>

      <p>Your slots</p>
      ${render(mySlots,'dot-green')}

      <p>Opponent slots</p>
      ${render(oppSlots,'dot-orange')}

      <select id="pick">
        ${allOpp.map((s,i)=>`<option value="${i}">${s.day} - ${s.slot}</option>`)}
      </select>

      <a id="btn1" class="wa-btn">Propose slot</a>
      <a id="btn2" class="wa-btn">Send full availability</a>
    `;

    const pick = document.getElementById('pick');

    function update1(){
      let c = allOpp[pick.value];
      let msg = `Hi, I can try to adjust. Can we play ${c.day} ${c.slot}?`;
      btn1.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    }

    function update2(){
      let msg = `No overlap.

My: ${formatSlots(mySlots)}

Yours: ${formatSlots(oppSlots)}

Can we find a middle ground?`;

      btn2.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    }

    update1();
    update2();

    pick.addEventListener('change',update1);
  }

  resultCard.classList.add('visible');
}

</script>

</body>
</html>
