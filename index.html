<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Availability</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f0f0f;
    color: #e8e6e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 460px;
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .header h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.5rem;
  }

  .header p {
    font-size: 26px;
    font-weight: 600;
    color: #e8e6e0;
    line-height: 1.2;
  }

  .card {
    background: #1a1a1a;
    border: 0.5px solid #2e2e2e;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .field input {
    width: 100%;
    background: #111;
    border: 0.5px solid #333;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 22px;
    font-weight: 600;
    color: #e8e6e0;
    font-family: 'DM Mono', monospace;
    text-align: center;
    transition: border-color 0.15s;
    outline: none;
  }

  .field input:focus {
    border-color: #555;
  }

  .field input::placeholder {
    color: #333;
    font-size: 18px;
  }

  .round-row {
    margin-bottom: 0;
  }

  .round-row label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .round-row input {
    width: 100%;
    background: #111;
    border: 0.5px solid #333;
    border-radius: 10px;
    padding: 0.6rem 1rem;
    font-size: 15px;
    color: #e8e6e0;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .round-row input:focus {
    border-color: #555;
  }

  .round-row input::placeholder {
    color: #333;
  }

  button {
    width: 100%;
    padding: 0.9rem;
    background: #e8e6e0;
    color: #0f0f0f;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 1.25rem;
  }

  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .result-card {
    background: #1a1a1a;
    border: 0.5px solid #2e2e2e;
    border-radius: 16px;
    padding: 1.5rem;
    display: none;
  }

  .result-card.visible { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid #2e2e2e;
  }

  .result-names {
    font-size: 13px;
    color: #888;
  }

  .result-names strong {
    color: #e8e6e0;
    font-weight: 600;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .status-found {
    background: #0d2e1a;
    color: #4ade80;
    border: 0.5px solid #166534;
  }

  .status-none {
    background: #2e1a0d;
    color: #fb923c;
    border: 0.5px solid #9a3412;
  }

  .slots-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    font-weight: 500;
    margin-bottom: 0.75rem;
  }

  .slots-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .slot-item {
    background: #111;
    border: 0.5px solid #2e2e2e;
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-size: 13px;
    color: #e8e6e0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .slot-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-green { background: #4ade80; }
  .dot-orange { background: #fb923c; }

  .slot-day {
    font-size: 10px;
    color: #666;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.4rem;
    padding-top: 0.5rem;
    grid-column: 1 / -1;
  }

  .no-slots-msg {
    font-size: 14px;
    color: #888;
    line-height: 1.6;
  }

  .error-msg {
    font-size: 13px;
    color: #fb923c;
    margin-top: 0.75rem;
    text-align: center;
    display: none;
  }

  .loading-msg {
    font-size: 13px;
    color: #666;
    margin-top: 0.75rem;
    text-align: center;
    display: none;
  }

  .opponent-slots {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 0.5px solid #2e2e2e;
  }

  .wa-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 1rem;
    padding: 0.75rem;
    background: #0d2e1a;
    color: #4ade80;
    border: 0.5px solid #166534;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.1s;
  }

  .wa-btn:hover { opacity: 0.85; }
  .wa-btn:active { transform: scale(0.98); }

  .wa-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .slot-picker {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 0.5px solid #2e2e2e;
  }

  .slot-picker-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    font-weight: 500;
    margin-bottom: 0.6rem;
  }

  .slot-picker select {
    width: 100%;
    background: #111;
    border: 0.5px solid #333;
    border-radius: 10px;
    padding: 0.65rem 1rem;
    font-size: 14px;
    color: #e8e6e0;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    cursor: pointer;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>League Scheduler</h1>
    <p>Find your<br>match slot.</p>
  </div>

  <div class="card">
    <div class="input-row">
      <div class="field">
        <label>Your #</label>
        <input type="number" id="myNum" placeholder="—" min="1" max="60" />
      </div>
      <div class="field">
        <label>Opponent #</label>
        <input type="number" id="oppNum" placeholder="—" min="1" max="60" />
      </div>
    </div>
    <div class="round-row">
      <label>Batch</label>
      <input type="number" id="roundNum" placeholder="Enter batch number" min="1" />
    </div>
    <button id="findBtn" onclick="findSlots()">Find common slots</button>
    <div class="loading-msg" id="loadingMsg">Fetching availability...</div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-names">
        Player <strong id="rMyNum">—</strong> vs Player <strong id="rOppNum">—</strong>
      </div>
      <div class="status-badge" id="statusBadge"></div>
    </div>
    <div id="resultBody"></div>
  </div>
</div>

<script>
const SHEET_ID = '1GlI41zACu2-1xbo6dZXFLMW6cqJrx0fEc2mywIRoeFg';
const RESPONSES_TAB = 'Form Responses';
const PLAYERS_TAB = 'Players';

const SLOT_COLS = [
  '12am–1am','1am–2am','2am–3am','3am–4am','4am–5am','5am–6am',
  '6am–7am','7am–8am','8am–9am','9am–10am','10am–11am','11am–12pm',
  '12pm–1pm','1pm–2pm','2pm–3pm','3pm–4pm','4pm–5pm','5pm–6pm',
  '6pm–7pm','7pm–8pm','8pm–9pm','9pm–10pm','10pm–11pm','11pm–12am'
];

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table;
}

function parseRows(table) {
  const headers = table.cols.map(c => (c.label || '').trim());
  return table.rows.map(row => {
    const obj = {};
    row.c.forEach((cell, i) => {
      obj[headers[i]] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v).trim() : '') : '';
    });
    return obj;
  });
}

function getLatestResponse(rows, playerNum, roundNum) {
  const matches = rows.filter(r =>
    String(r['Player Number']).trim() === String(playerNum).trim() &&
    String(r['Round Number']).trim() === String(roundNum).trim()
  );
  if (!matches.length) return null;
  return matches[matches.length - 1];
}

function getAvailableSlots(row) {
  const slots = { 'Day 1': [], 'Day 2': [] };
  SLOT_COLS.forEach(slot => {
    const key = `Availability [${slot}]`;
    const val = row[key] || '';
    if (val.includes('Day 1')) slots['Day 1'].push(slot);
    if (val.includes('Day 2')) slots['Day 2'].push(slot);
  });
  return slots;
}

function intersectSlots(a, b) {
  return {
    'Day 1': a['Day 1'].filter(s => b['Day 1'].includes(s)),
    'Day 2': a['Day 2'].filter(s => b['Day 2'].includes(s))
  };
}

function renderSlots(slots, dotClass, emptyMsg) {
  const d1 = slots['Day 1'];
  const d2 = slots['Day 2'];
  if (!d1.length && !d2.length) {
    return `<p class="no-slots-msg">${emptyMsg}</p>`;
  }
  let html = '<div class="slots-grid">';
  if (d1.length) {
    html += `<span class="slot-day">Day 1</span>`;
    d1.forEach(s => {
      html += `<div class="slot-item"><span class="dot ${dotClass}"></span>${s}</div>`;
    });
  }
  if (d2.length) {
    html += `<span class="slot-day">Day 2</span>`;
    d2.forEach(s => {
      html += `<div class="slot-item"><span class="dot ${dotClass}"></span>${s}</div>`;
    });
  }
  html += '</div>';
  return html;
}

async function findSlots() {
  const myNum = document.getElementById('myNum').value.trim();
  const oppNum = document.getElementById('oppNum').value.trim();
  const roundNum = document.getElementById('roundNum').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const loadingMsg = document.getElementById('loadingMsg');
  const resultCard = document.getElementById('resultCard');
  const btn = document.getElementById('findBtn');

  errorMsg.style.display = 'none';
  resultCard.classList.remove('visible');

  if (!myNum || !oppNum || !roundNum) {
    errorMsg.textContent = 'Please fill in all three fields.';
    errorMsg.style.display = 'block';
    return;
  }

  if (myNum === oppNum) {
    errorMsg.textContent = 'Player numbers must be different.';
    errorMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  loadingMsg.style.display = 'block';

  try {
    const table = await fetchSheet(RESPONSES_TAB);
    const rows = parseRows(table);

    const myRow = getLatestResponse(rows, myNum, roundNum);
    const oppRow = getLatestResponse(rows, oppNum, roundNum);

    if (!myRow && !oppRow) {
      errorMsg.textContent = `Neither player ${myNum} nor player ${oppNum} has submitted availability for round ${roundNum}.`;
      errorMsg.style.display = 'block';
      return;
    }
    if (!myRow) {
      errorMsg.textContent = `Player ${myNum} hasn't submitted availability for round ${roundNum} yet.`;
      errorMsg.style.display = 'block';
      return;
    }
    if (!oppRow) {
      errorMsg.textContent = `Player ${oppNum} hasn't submitted availability for round ${roundNum} yet.`;
      errorMsg.style.display = 'block';
      return;
    }

    const mySlots = getAvailableSlots(myRow);
    const oppSlots = getAvailableSlots(oppRow);
    const common = intersectSlots(mySlots, oppSlots);
    const hasCommon = common['Day 1'].length > 0 || common['Day 2'].length > 0;

    document.getElementById('rMyNum').textContent = myNum;
    document.getElementById('rOppNum').textContent = oppNum;

    const badge = document.getElementById('statusBadge');
    const body = document.getElementById('resultBody');

    if (hasCommon) {
      badge.textContent = 'Slots found';
      badge.className = 'status-badge status-found';

      const allCommon = [];
      ['Day 1','Day 2'].forEach(day => {
        common[day].forEach(slot => allCommon.push({ day, slot }));
      });

      const options = allCommon.map((s, i) =>
        `<option value="${i}">${s.day} — ${s.slot}</option>`
      ).join('');

      body.innerHTML = `
        <p class="slots-label">Common slots</p>
        ${renderSlots(common, 'dot-green', '')}
        <div class="slot-picker">
          <p class="slot-picker-label">Share a slot on WhatsApp</p>
          <select id="slotSelect">${options}</select>
          <a id="waBtn" class="wa-btn" href="#" target="_blank" style="margin-top:0.75rem;">
            <svg class="wa-icon" viewBox="0 0 24 24" fill="#4ade80" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.122 1.528 5.855L0 24l6.335-1.508A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.877 9.877 0 01-5.034-1.378l-.361-.214-3.741.981.999-3.648-.235-.374A9.861 9.861 0 012.118 12C2.118 6.533 6.533 2.118 12 2.118c5.466 0 9.882 4.415 9.882 9.882 0 5.466-4.416 9.882-9.882 9.882z"/>
            </svg>
            Send to opponent
          </a>
        </div>
      `;

      function updateWaLink() {
        const idx = document.getElementById('slotSelect').value;
        const chosen = allCommon[idx];
        const msg = `Hi! I checked our availability for Batch ${roundNum}. We can play on ${chosen.day} during ${chosen.slot}. Does that work for you?`;
        document.getElementById('waBtn').href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
      }

      updateWaLink();
      document.getElementById('slotSelect').addEventListener('change', updateWaLink);
    } else {
  badge.textContent = 'No overlap';
  badge.className = 'status-badge status-none';

  function formatSlots(slots) {
    return ['Day 1','Day 2']
      .map(day => {
        if (!slots[day].length) return null;
        return `${day}: ${slots[day].join(', ')}`;
      })
      .filter(Boolean)
      .join(' | ');
  }

  body.innerHTML = `
    <p class="no-slots-msg" style="margin-bottom:1rem;">
      No common slots found. Share availability and coordinate directly.
    </p>

    <div class="opponent-slots">
      <p class="slots-label">Opponent's availability</p>
      ${renderSlots(oppSlots, 'dot-orange', 'Opponent has no slots marked.')}
    </div>

    <a id="waBtnFull" class="wa-btn" href="#" target="_blank" style="margin-top:1rem;">
      <svg class="wa-icon" viewBox="0 0 24 24" fill="#4ade80" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.122 1.528 5.855L0 24l6.335-1.508A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.877 9.877 0 01-5.034-1.378l-.361-.214-3.741.981.999-3.648-.235-.374A9.861 9.861 0 012.118 12C2.118 6.533 6.533 2.118 12 2.118c5.466 0 9.882 4.415 9.882 9.882 0 5.466-4.416 9.882-9.882 9.882z"/>
      </svg>
      Share availability
    </a>
  `;

  function updateFullWaLink() {
    const myFormatted = formatSlots(mySlots);
    const oppFormatted = formatSlots(oppSlots);

    const msg = `Hi! It looks like we don't have overlapping slots for Batch ${roundNum}.

My availability:
${myFormatted}

Your availability:
${oppFormatted}

Can we find a middle ground?`;

    document.getElementById('waBtnFull').href =
      `https://wa.me/?text=${encodeURIComponent(msg)}`;
  }

  updateFullWaLink();
}

    resultCard.classList.add('visible');

  } catch (err) {
    errorMsg.textContent = 'Could not fetch data. Make sure the sheet is publicly accessible.';
    errorMsg.style.display = 'block';
    console.error(err);
  } finally {
    btn.disabled = false;
    loadingMsg.style.display = 'none';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') findSlots();
});
</script>
</body>
</html>
